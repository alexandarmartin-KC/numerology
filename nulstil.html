<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <title>Nulstil alt data</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="text-center">
    <h2>Nulstil ALT data</h2>
    <p class="text-muted">Sletter al localStorage + tømmer alle DB-tabeller</p>
    <button id="btn" class="btn btn-danger btn-lg mt-3">Slet alt data</button>
    <div id="result" class="mt-3"></div>
  </div>
  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      if (!confirm('Er du sikker? ALT data i alle input-sider slettes permanent.')) return;

      const el = document.getElementById('result');
      el.innerHTML = '<span class="text-warning">Arbejder...</span>';

      // 1. Ryd localStorage
      localStorage.clear();

      // 2. Tøm DB
      try {
        const res = await fetch('/api/clear-all.php');
        const d = await res.json();
        el.innerHTML = '<span class="text-success">Alt data er slettet!</span><br><pre class="text-start text-light mt-2" style="font-size:12px;">' + JSON.stringify(d, null, 2) + '</pre>';
      } catch (e) {
        el.innerHTML = '<span class="text-success">localStorage ryddet.</span><br><span class="text-danger">DB-fejl: ' + e.message + '</span>';
      }
    });
  </script>
</body>
</html>
