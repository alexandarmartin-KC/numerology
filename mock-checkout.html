<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Betaling — Mock Checkout</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f6f9fc;
      min-height: 100vh;
      display: flex;
    }

    /* Left panel — product summary */
    .summary {
      flex: 0 0 420px;
      background: #0a2540;
      color: #fff;
      padding: 3.5rem 2.5rem;
      display: flex;
      flex-direction: column;
    }
    .summary .back {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 2.5rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .summary .back:hover { color: #fff; }
    .summary .product-name {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 0.3rem;
    }
    .summary .price {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 2rem;
    }
    .summary .detail {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 1.5rem;
    }
    .summary .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      font-size: 0.92rem;
    }
    .summary .detail-row .label { color: rgba(255,255,255,0.6); }
    .summary .detail-row.total {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 0.8rem;
      margin-top: 0.4rem;
      font-weight: 600;
    }
    .summary .meta {
      margin-top: auto;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
    }

    /* Right panel — payment form */
    .checkout {
      flex: 1;
      padding: 3.5rem 3rem;
      max-width: 540px;
    }

    .payment-methods {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .pm-btn {
      flex: 1;
      padding: 0.7rem;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .pm-btn:hover {
      border-color: #635bff;
    }
    .pm-btn.active {
      border-color: #635bff;
      box-shadow: 0 0 0 1px #635bff;
    }
    .pm-btn img {
      height: 18px;
    }

    .section-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #30313d;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .or-divider {
      text-align: center;
      color: #8792a2;
      font-size: 0.82rem;
      margin: 1.2rem 0;
      position: relative;
    }
    .or-divider::before, .or-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #d8dee4;
    }
    .or-divider::before { left: 0; }
    .or-divider::after { right: 0; }

    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #30313d;
      margin-bottom: 0.35rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid #d8dee4;
      border-radius: 8px;
      font-size: 0.92rem;
      outline: none;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: #635bff;
      box-shadow: 0 0 0 1px #635bff;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .card-input {
      position: relative;
    }
    .card-input .card-icons {
      position: absolute;
      right: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 0.3rem;
    }
    .card-icon {
      display: inline-block;
      width: 28px;
      height: 18px;
      border-radius: 3px;
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      text-align: center;
      line-height: 18px;
    }
    .card-icon.visa { background: #1a1f71; }
    .card-icon.mc { background: linear-gradient(135deg, #eb001b 0%, #f79e1b 100%); }
    .card-icon.amex { background: #2e77bb; }

    .pay-btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      background: #635bff;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.15s;
    }
    .pay-btn:hover {
      background: #4f46e5;
    }

    .powered-by {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: #8792a2;
    }
    .powered-by span { color: #635bff; font-weight: 600; }

    .mock-banner {
      background: #fef3cd;
      color: #856404;
      text-align: center;
      padding: 0.5rem 1rem;
      font-size: 0.82rem;
      font-weight: 500;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }

    @media (max-width: 820px) {
      body { flex-direction: column; }
      .summary { flex: none; padding: 2rem 1.5rem; }
      .checkout { padding: 2rem 1.5rem; max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="mock-banner">⚠ MOCK CHECKOUT — dette er en test-visning, ingen reel betaling</div>

  <div class="summary">
    <a class="back" href="landing-analyse-35usd.html">← Tilbage</a>
    <div class="product-name">Personlig numerologisk analyse</div>
    <div class="price" id="totalPrice">€30,00</div>

    <div class="detail">
      <div class="detail-row">
        <span class="label">Analyse for:</span>
        <span id="customerName">—</span>
      </div>
      <div class="detail-row">
        <span class="label">Fødselsdag:</span>
        <span id="customerBirth">—</span>
      </div>
      <div class="detail-row">
        <span class="label">E-mail:</span>
        <span id="customerEmail">—</span>
      </div>
      <div class="detail-row total">
        <span>I alt</span>
        <span class="total-amount">€30,00</span>
      </div>
    </div>

    <div class="meta">Drevet af Stripe (mock)</div>
  </div>

  <div class="checkout">
    <!-- Express checkout buttons -->
    <div class="section-label">Hurtig betaling</div>
    <div class="payment-methods">
      <button class="pm-btn" onclick="mockPay('apple')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.52-3.23 0-1.44.65-2.2.46-3.06-.4C3.79 16.17 4.36 9.05 8.93 8.78c1.28.07 2.17.74 2.92.78.97-.2 1.9-.9 2.97-.82 1.25.1 2.2.6 2.8 1.53-2.56 1.53-1.95 4.88.53 5.81-.46 1.2-.68 1.74-1.3 2.8l.2 1.4zM12.05 8.72c-.15-2.08 1.53-3.87 3.47-4.07.28 2.26-2.03 4.23-3.47 4.07z"/></svg>
        Apple Pay
      </button>
      <button class="pm-btn" onclick="mockPay('google')">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google Pay
      </button>
    </div>

    <div class="or-divider">Eller betal med kort</div>

    <!-- Card form -->
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" placeholder="din@email.dk" value="">
    </div>

    <div class="form-group card-input">
      <label>Kortnummer</label>
      <input type="text" placeholder="4242 4242 4242 4242" maxlength="19">
      <div class="card-icons">
        <span class="card-icon visa">VISA</span>
        <span class="card-icon mc">MC</span>
        <span class="card-icon amex">AMEX</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Udløbsdato</label>
        <input type="text" placeholder="MM / ÅÅ" maxlength="7">
      </div>
      <div class="form-group">
        <label>CVC</label>
        <input type="text" placeholder="123" maxlength="4">
      </div>
    </div>

    <div class="form-group">
      <label>Navn på kort</label>
      <input type="text" placeholder="Fuldt navn" id="cardName">
    </div>

    <div class="form-group">
      <label>Land</label>
      <select>
        <option>Danmark</option>
        <option>Sverige</option>
        <option>Norge</option>
        <option>Tyskland</option>
        <option>USA</option>
      </select>
    </div>

    <!-- PayPal -->
    <div class="or-divider">Eller</div>
    <div class="payment-methods">
      <button class="pm-btn" style="flex: 1; background: #ffc439; border-color: #ffc439; color: #003087;" onclick="mockPay('paypal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#003087"><path d="M7.076 21.337H2.47a.641.641 0 01-.633-.74L4.944 2.23A.774.774 0 015.708 1.6h6.882c2.27 0 3.952.49 4.988 1.454.507.472.862 1.035 1.058 1.674.204.664.248 1.462.132 2.378l-.012.08v.69l.54.307c.456.241.816.532 1.086.873.346.438.564.952.646 1.527.086.59.038 1.293-.143 2.09-.21.915-.548 1.71-1.009 2.36-.421.594-.952 1.08-1.577 1.445-.597.346-1.302.598-2.095.747-.768.145-1.638.218-2.588.218h-.614a1.88 1.88 0 00-1.241.47 1.88 1.88 0 00-.638 1.16l-.046.26-.775 4.923-.035.19c-.012.073-.033.11-.063.134a.168.168 0 01-.103.036z"/></svg>
        PayPal
      </button>
    </div>

    <button class="pay-btn" onclick="mockPay('card')">Betal €30,00</button>

    <div class="powered-by">Drevet af <span>stripe</span></div>
  </div>

  <script>
    // Read customer data from URL params
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name') || '—';
    const birth = params.get('birth') || '—';
    const email = params.get('email') || '';
    const currency = params.get('currency') || 'eur';
    const priceLabel = currency === 'usd' ? '$35.00' : '€30,00';

    document.getElementById('customerName').textContent = name;
    document.getElementById('customerBirth').textContent = birth;
    document.getElementById('customerEmail').textContent = email || '—';
    document.getElementById('totalPrice').textContent = priceLabel;
    document.querySelectorAll('.total-amount').forEach(el => el.textContent = priceLabel);
    document.querySelector('.pay-btn').textContent = `Betal ${priceLabel}`;

    if (name !== '—') {
      document.getElementById('cardName').value = name;
    }
    if (email) {
      document.querySelector('.checkout input[type="email"]').value = email;
    }

    function mockPay(method) {
      const methodNames = { apple: 'Apple Pay', google: 'Google Pay', paypal: 'PayPal', card: 'Kort' };
      const confirmed = confirm(`MOCK: Simuler betaling med ${methodNames[method]}?\n\nKunde: ${name}\nFødselsdag: ${birth}\nBeløb: ${priceLabel}`);
      if (confirmed) {
        window.location.href = 'tak.html?session_id=mock_session_' + Date.now();
      }
    }
  </script>
</body>
</html>
