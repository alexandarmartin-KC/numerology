  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <script>

// -------------------------
// Utils
// -------------------------

function digitReduce(n) {
  if (n === 0) return 0;
  while (n > 9) {
    n = n.toString().split('').reduce((a, b) => a + parseInt(b), 0);
  }
  return n;
}

function formatNumber(compound) {
  const reduced = digitReduce(compound);
  if (compound < 10) return compound.toString();
  return compound + "/" + reduced;
}

// -------------------------
// Load stored diamant data
// -------------------------

function getStoredData() {
  const raw = localStorage.getItem("numerologyData");
  if (!raw) return null;
  return JSON.parse(raw);
}

// -------------------------
// Cycle Classification
// -------------------------

function getCycleType(birthYear) {
  const r = digitReduce(birthYear);

  if (r === 9) return "9";
  if (r === 3 || r === 6) return "3-6";
  return "1-2-4-8-7-5";
}

// -------------------------
// Step helper
// -------------------------

function addStep(state, addValue, lines, underline = true) {
  const base = digitReduce(state.compound);
  const newCompound = base + addValue;
  state.compound = newCompound;

  lines.push({ text: String(addValue), underline });
  lines.push({ text: formatNumber(state.compound), underline: false });
}

// -------------------------
// 9 Cycle Logic
// -------------------------

function applyCycle9(yearReduced, state, soejle, lines) {
  if (yearReduced === 8) {
    addStep(state, 9, lines, true);       // ud
    addStep(state, soejle, lines, true);  // søjle
  }

  if (yearReduced === 9) {
    addStep(state, 9, lines, true);       // ud
    addStep(state, 9, lines, true);       // ind
    addStep(state, soejle, lines, true);  // søjle
  }
}

// -------------------------
// 3-6 Cycle Logic
// -------------------------

function applyCycle36(yearReduced, birthYearReduced, state, soejle, lines) {
  const key = birthYearReduced === 3 ? [3,6] : [6,3];

  if (yearReduced === key[1]) {
    addStep(state, key[0], lines, true);    // ud
    addStep(state, key[1], lines, true);    // ind
    addStep(state, soejle, lines, true);    // søjle
  }

  if (yearReduced === key[0]) {
    addStep(state, key[1], lines, true);    // ud
    addStep(state, soejle, lines, true);    // søjle
  }
}

// -------------------------
// 1-2-4-8-7-5 Cycle Logic
// -------------------------

const cycleSeq = [1,2,4,8,7,5];

// Determine which chapter a given year falls in, based on birth year.
// The cycle repeats every 27 years (1+2+4+8+7+5).
// Each chapter's number = its duration in years AND its cycle energy.
function getChapterInfo(year, birthYear) {
  const birthYearReduced = digitReduce(birthYear);
  const startIdx = cycleSeq.indexOf(birthYearReduced);
  if (startIdx === -1) return null;

  const yearsFromBirth = year - birthYear;
  let pos = ((yearsFromBirth % 27) + 27) % 27;

  let accumulated = 0;
  for (let i = 0; i < 6; i++) {
    const seqIdx = (startIdx + i) % 6;
    const chapterValue = cycleSeq[seqIdx];
    if (pos < accumulated + chapterValue) {
      const prevSeqIdx = (seqIdx - 1 + 6) % 6;
      return {
        chapterValue: chapterValue,
        isFirstYear: pos === accumulated,
        isLastYear: pos === accumulated + chapterValue - 1,
        prevChapterValue: cycleSeq[prevSeqIdx],
        isBirthChapter: i === 0
      };
    }
    accumulated += chapterValue;
  }
  return null;
}

function applyCycle124875(year, birthYear, yearReduced, state, soejle, lines) {
  if (year === birthYear) return;  // no cycle transition at actual birth year

  const info = getChapterInfo(year, birthYear);
  if (!info) return;

  if (info.isFirstYear) {
    // ud (exiting previous chapter)
    addStep(state, info.prevChapterValue, lines, true);
    // ind (entering new chapter)
    addStep(state, info.chapterValue, lines, true);
    // Special: chapter 1 is only 1 year, so exit it immediately too
    if (info.chapterValue === 1) {
      addStep(state, 1, lines, true);  // ud af 1
    }
    // søjle
    addStep(state, soejle, lines, true);
  } else if (info.isLastYear) {
    // Last year of chapter: ud (exiting this chapter) + søjle
    addStep(state, info.chapterValue, lines, true);
    addStep(state, soejle, lines, true);
  }
}

// -------------------------
// Age
// -------------------------

function applyAge(state, ageReduced, lines) {
  addStep(state, ageReduced, lines, true);
}

// -------------------------
// Render
// -------------------------

function renderYearBlock({ year, yearReduced, bodyLines, isChapterStart }) {
  return `
    <div class="card year-card mb-4" style="width: max-content; min-width: 200px; background-color: #f5f6f8; page-break-inside: avoid; break-inside: avoid;">
      <div class="card-body">
        <div class="cycle-grid">
          <div class="cycle-year">${year}</div>
          <div class="cycle-reduced${isChapterStart ? ' chapter-start' : ''}">${yearReduced}</div>

          <div class="cycle-body">
            ${bodyLines.map(item => `
              <div class="cycle-line ${item.underline ? "has-underline" : ""}">
                ${item.text}
              </div>
            `).join("")}
          </div>
        </div>
      </div>
    </div>
  `;
}

// -------------------------
// Main
// -------------------------

function calculateYear() {

  const data = getStoredData();
  if (!data) {
    alert("Indtast først data på Diamant-siden.");
    return;
  }

  const startYear = parseInt(document.getElementById("targetYear").value);
  const cycleType = getCycleType(data.birthYear);

  let cycleLength = 9;
  if (cycleType === "1-2-4-8-7-5") cycleLength = 27;

  let finalBlocks = [];

  for (let i = 0; i < cycleLength; i++) {

    const year = startYear + i;
    const yearReduced = digitReduce(year);
    const birthYearReduced = digitReduce(data.birthYear);
    const ageReduced = digitReduce(year - data.birthYear);

    let bodyLines = [];

    // State holder compound som helt tal
    const state = { compound: yearReduced };

    // TOP
    addStep(state, data.grund, bodyLines, true);

    // BUND
    addStep(state, data.bund, bodyLines, true);

    // CYCLE
    let isChapterStart = false;

    if (cycleType === "9") {
      applyCycle9(yearReduced, state, data.soejle, bodyLines);
      if (yearReduced === 9) isChapterStart = true;
    }

    if (cycleType === "3-6") {
      applyCycle36(yearReduced, birthYearReduced, state, data.soejle, bodyLines);
      const key = birthYearReduced === 3 ? [3,6] : [6,3];
      if (yearReduced === key[0] || yearReduced === key[1]) isChapterStart = true;
    }

    if (cycleType === "1-2-4-8-7-5") {
      applyCycle124875(year, data.birthYear, yearReduced, state, data.soejle, bodyLines);
      const info = getChapterInfo(year, data.birthYear);
      if (info && info.isFirstYear) isChapterStart = true;
    }

    // AGE
    applyAge(state, ageReduced, bodyLines);

    finalBlocks.push({ year, yearReduced, bodyLines, isChapterStart });
  }

  // Render diamond
  const outputEl = document.getElementById("output");
  outputEl.innerHTML = '';

  let beregningerHTML = '';

  if (data.fullName && data.birthDateISO) {
    try {
      const diamondResult = computeDiamond(data.fullName, data.birthDateISO);

      // Build beregninger list
      beregningerHTML = buildBeregninger(diamondResult);

      const wrapper = document.createElement('div');
      wrapper.className = 'diamond-page';
      wrapper.style.maxWidth = '500px';
      wrapper.style.margin = '0 auto';
      renderDiamond(wrapper, diamondResult.diamond);
      outputEl.appendChild(wrapper);
    } catch(e) { console.warn('Diamant kunne ikke genskabes:', e); }
  }

  outputEl.innerHTML += finalBlocks.map(renderYearBlock).join("");

  // Add beregninger section (hidden on screen, included in PDF)
  if (beregningerHTML) {
    outputEl.innerHTML += '<div class="beregninger-page" style="display:none;">' + beregningerHTML + '</div>';
  }

  document.getElementById("pdfBtn").disabled = false;
}

// -------------------------
// Build Beregninger HTML
// -------------------------

function buildBeregninger(result) {
  const d = result.diamond;
  const middles = d.livslinje.filter(e => e.role === "mellemnavn");

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function item(label, value) {
    return '<li style="display:flex;justify-content:space-between;align-items:center;padding:6px 12px;border-bottom:1px solid #eee;font-size:13px;"><span>' + label + '</span><strong>' + value + '</strong></li>';
  }
  function header(text) {
    return '<li style="padding:6px 12px;background:#f0f0f0;text-transform:uppercase;font-size:11px;font-weight:700;border-bottom:1px solid #eee;">' + text + '</li>';
  }

  let html = '<h4 style="margin-bottom:12px;font-size:16px;">Beregninger</h4>';
  html += '<ul style="list-style:none;padding:0;margin:0;">';

  html += item('Grundenergi (fødselsdag)', d.grundenergi.display);

  html += header('Livslinje');
  d.livslinje.forEach(function(e) {
    var label = e.role === 'fornavn' ? 'Fornavn' : e.role === 'efternavn' ? 'Efternavn' : 'Mellemnavn';
    html += item(label + ': ' + esc(e.name), e.display);
  });

  html += item('Bundtal', d.bundtal.display);

  html += header('Aura');
  html += item('Øverst venstre', d.aura.auraUpperLeft.display);
  html += item('Øverst højre', d.aura.auraUpperRight.display);
  html += item('Nederst venstre', d.aura.auraLowerLeft.display);
  html += item('Nederst højre', d.aura.auraLowerRight.display);

  html += header('Hjertecenter');
  html += item('Hjertecenter', d.body.hjertecenter.centerTal.display);
  d.body.hjertecenter.mellemnavnsBidrag.forEach(function(ex, i) {
    html += item('Hjerte-ekstra (' + esc(middles[i]?.name || '') + ')', ex.display);
  });

  html += header('Solarplexus');
  html += item('Solarplexus', d.body.solarplexus.centerTal.display);
  d.body.solarplexus.mellemnavnsBidrag.forEach(function(ex, i) {
    html += item('Solar-ekstra (' + esc(middles[i]?.name || '') + ')', ex.display);
  });

  html += header('Rygraden');
  html += item('Rygraden', d.firkanttal.display);

  html += header('Søjletal');
  html += item('Søjletal', d.soejletal.compound + '/' + d.soejletal.reduced);

  html += '</ul>';
  return html;
}

function exportPDF() {
  window.print();
}

  </script>
