<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cover Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    @page { size: A4; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c9a84c; --gold-light: #e2c47a; --dark: #1a1612; }
    body { font-family: 'Inter', sans-serif; background: #f0ede8; }

    .cover {
      width: 210mm; min-height: 297mm; background: #fff;
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 20mm; padding-top: 38mm;
      overflow: hidden;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .cover::before {
      content: ''; position: absolute; inset: 10mm;
      border: 1px solid var(--gold); opacity: .45; pointer-events: none;
    }
    .cover::after {
      content: ''; position: absolute; inset: 11.5mm;
      border: .5px solid var(--gold); opacity: .2; pointer-events: none;
    }
    .corner { position: absolute; width: 10mm; height: 10mm; opacity: .5; }
    .corner-tl { top: 13mm; left: 13mm; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-tr { top: 13mm; right: 13mm; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
    .corner-bl { bottom: 13mm; left: 13mm; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
    .corner-br { bottom: 13mm; right: 13mm; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

    .cover-inner {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .cover-brand { font-size: 8pt; font-weight: 600; letter-spacing: .3em; text-transform: uppercase; color: var(--gold); margin-bottom: 4pt; }
    .cover-tagline { font-size: 6.5pt; font-weight: 300; letter-spacing: .2em; text-transform: uppercase; color: #aaa; margin-bottom: 18pt; }
    .cover-rule { width: 40mm; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 0 auto 22pt; opacity: .6; }
    .cover-name { font-family: 'Cormorant Garamond', serif; font-size: 32pt; font-weight: 600; color: var(--dark); letter-spacing: .01em; line-height: 1.1; margin-bottom: 6pt; }
    .cover-birthdate { font-size: 8pt; font-weight: 300; letter-spacing: .1em; color: #999; margin-bottom: 10pt; }
    .cover-plan { font-size: 7pt; font-weight: 600; letter-spacing: .25em; text-transform: uppercase; color: var(--gold); margin-bottom: 28pt; }
    .cover-rule-2 { width: 20mm; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 0 auto 22pt; opacity: .4; }
    .cover-energy-label { font-size: 6.5pt; font-weight: 600; letter-spacing: .25em; text-transform: uppercase; color: #bbb; margin-bottom: 10pt; }

    .cover-planet-wrap {
      position: relative; width: 80mm; height: 80mm;
      display: flex; align-items: center; justify-content: center;
    }
    .cover-planet-wrap img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: contain; opacity: .2; filter: sepia(30%) saturate(50%);
    }
    .cover-circle-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 80pt; font-weight: 300; color: var(--dark); line-height: 1; position: relative;
    }
    .cover-footer {
      position: absolute; bottom: 17mm; left: 50%; transform: translateX(-50%);
      font-size: 6pt; letter-spacing: .15em; text-transform: uppercase; color: #ccc; white-space: nowrap;
    }

    @media print {
      @page { size: A4; margin: 0; }
      html, body { margin: 0; background: #fff; }
      .cover { width: 210mm; height: 297mm; min-height: unset; }
    }
  </style>
</head>
<body>
  <div class="cover">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="cover-inner">
      <div class="cover-brand">Strategic Numerology</div>
      <div class="cover-tagline">Understand Yourself. Plan Your Timing.</div>
      <div class="cover-rule"></div>
      <div class="cover-name">Andreas Egholm Mollerup</div>
      <div class="cover-birthdate">6. juni 1980</div>
      <div class="cover-plan">Foundation Analyse</div>
      <div class="cover-rule-2"></div>
      <div class="cover-energy-label">Grundenergi</div>
      <div class="cover-planet-wrap">
        <img src="assets/images/Neptun.png" alt="">
        <span class="cover-circle-number">7</span>
      </div>
    </div>

    <div class="cover-footer">Fortrolig &mdash; Personlig rapport</div>
  </div>
</body>
</html>
